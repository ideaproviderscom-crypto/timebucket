<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>タイムバケット</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d2e;
    --surface2: #252840;
    --accent: #6c63ff;
    --accent2: #ff6584;
    --green: #43d98f;
    --yellow: #ffd166;
    --red: #ef476f;
    --text: #e8e8f0;
    --text2: #9090b0;
    --border: #2e3150;
    --radius: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; }

  /* ── ヘッダー ── */
  header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
  header h1 { font-size: 1.1rem; font-weight: 700; color: var(--accent); }
  #syncStatus { font-size: 0.65em; color: var(--green); margin-left: 8px; }
  .header-right { display: flex; gap: 8px; align-items: center; }
  .btn-icon { background: var(--surface2); border: 1px solid var(--border); color: var(--text); border-radius: 8px; padding: 6px 10px; cursor: pointer; font-size: 0.8rem; transition: background 0.2s; }
  .btn-icon:hover { background: var(--accent); border-color: var(--accent); }

  /* ── 設定画面 ── */
  #settingsModal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 500; align-items: center; justify-content: center; }
  #settingsModal.open { display: flex; }
  .modal-box { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; width: min(400px, 92vw); }
  .modal-box h3 { margin-bottom: 16px; color: var(--accent); }
  .form-row { margin-bottom: 14px; }
  .form-row label { display: block; font-size: 0.82rem; color: var(--text2); margin-bottom: 4px; }
  .form-row input, .form-row select { width: 100%; background: var(--surface2); border: 1px solid var(--border); color: var(--text); border-radius: 8px; padding: 8px 12px; font-size: 0.95rem; }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }
  .btn-save { background: var(--accent); color: #fff; border: none; border-radius: 8px; padding: 8px 20px; cursor: pointer; font-size: 0.9rem; }
  .btn-cancel { background: var(--surface2); color: var(--text); border: 1px solid var(--border); border-radius: 8px; padding: 8px 20px; cursor: pointer; font-size: 0.9rem; }

  /* ── アイテム追加/編集モーダル ── */
  #itemModal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 500; align-items: center; justify-content: center; }
  #itemModal.open { display: flex; }

  /* ── タブ ── */
  .tabs { display: flex; gap: 4px; padding: 12px 16px 0; }
  .tab { background: var(--surface2); border: 1px solid var(--border); border-bottom: none; border-radius: 8px 8px 0 0; padding: 8px 16px; cursor: pointer; font-size: 0.85rem; color: var(--text2); transition: all 0.2s; }
  .tab.active { background: var(--surface); color: var(--text); border-color: var(--border); }

  /* ── フィルタ/ソート ── */
  .toolbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 10px 16px; display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .toolbar select { background: var(--surface2); border: 1px solid var(--border); color: var(--text); border-radius: 6px; padding: 5px 8px; font-size: 0.8rem; }
  .add-btn { background: var(--accent); color: #fff; border: none; border-radius: 8px; padding: 7px 16px; cursor: pointer; font-size: 0.85rem; margin-left: auto; font-weight: 600; }
  .add-btn:hover { opacity: 0.9; }

  /* ── コンテンツ ── */
  #content { padding: 16px; }

  /* ── タイムラインビュー ── */
  .timeline-wrap { overflow-x: auto; padding-bottom: 16px; }
  .timeline { display: flex; gap: 0; min-width: max-content; }
  .bucket-col { min-width: 160px; width: 160px; border-right: 1px solid var(--border); }
  .bucket-col:last-child { border-right: none; }
  .bucket-header { background: var(--surface2); border-bottom: 2px solid var(--accent); padding: 8px; text-align: center; font-size: 0.78rem; font-weight: 700; color: var(--accent); position: sticky; top: 0; }
  .bucket-header.current { background: rgba(108,99,255,0.2); border-bottom-color: var(--accent2); color: var(--accent2); }
  .bucket-body { padding: 8px; display: flex; flex-direction: column; gap: 6px; min-height: 80px; }

  /* ── カードコンポーネント ── */
  .item-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 8px 10px; cursor: pointer; transition: transform 0.15s, border-color 0.15s; }
  .item-card:hover { transform: translateY(-1px); border-color: var(--accent); }
  .item-card.done { border-left: 3px solid var(--green); opacity: 0.75; }
  .item-card.canceled { border-left: 3px solid var(--red); opacity: 0.5; }
  .item-card.pending { border-left: 3px solid var(--yellow); }
  .card-title { font-size: 0.82rem; font-weight: 600; line-height: 1.3; margin-bottom: 4px; }
  .card-status { font-size: 0.65rem; }
  .card-progress { height: 3px; background: var(--border); border-radius: 2px; margin-top: 5px; overflow: hidden; }
  .card-progress-bar { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.3s; }
  .card-progress-bar.done { background: var(--green); }

  /* ── カードビュー ── */
  .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 14px; }
  .card-big { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; cursor: pointer; transition: transform 0.15s, border-color 0.15s; }
  .card-big:hover { transform: translateY(-2px); border-color: var(--accent); }
  .card-big.done { border-left: 4px solid var(--green); }
  .card-big.canceled { border-left: 4px solid var(--red); opacity: 0.6; }
  .card-big.pending { border-left: 4px solid var(--yellow); }
  .card-big-title { font-size: 1rem; font-weight: 700; margin-bottom: 8px; }
  .card-big-bucket { font-size: 0.78rem; color: var(--accent); margin-bottom: 6px; }
  .card-big-memo { font-size: 0.82rem; color: var(--text2); margin-bottom: 10px; white-space: pre-wrap; word-break: break-word; }
  .card-big-progress-wrap { margin-bottom: 4px; }
  .card-big-progress-label { display: flex; justify-content: space-between; font-size: 0.75rem; color: var(--text2); margin-bottom: 3px; }
  .card-big-progress { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
  .card-big-progress-bar { height: 100%; background: var(--accent); border-radius: 3px; transition: width 0.3s; }
  .card-big-progress-bar.done { background: var(--green); }
  .status-badge { display: inline-block; font-size: 0.7rem; padding: 2px 8px; border-radius: 12px; font-weight: 600; }
  .status-badge.pending { background: rgba(255,209,102,0.2); color: var(--yellow); }
  .status-badge.done { background: rgba(67,217,143,0.2); color: var(--green); }
  .status-badge.canceled { background: rgba(239,71,111,0.2); color: var(--red); }

  /* ── 統計バー ── */
  .stats { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; margin-bottom: 16px; display: flex; gap: 20px; flex-wrap: wrap; align-items: center; }
  .stat-item { text-align: center; }
  .stat-num { font-size: 1.4rem; font-weight: 700; }
  .stat-label { font-size: 0.7rem; color: var(--text2); }
  .stat-num.green { color: var(--green); }
  .stat-num.yellow { color: var(--yellow); }
  .stat-num.red { color: var(--red); }
  .overall-progress { flex: 1; min-width: 200px; }
  .overall-progress-label { font-size: 0.78rem; color: var(--text2); margin-bottom: 5px; }
  .overall-bar { height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; }
  .overall-bar-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 4px; transition: width 0.4s; }

  /* ── empty state ── */
  .empty { text-align: center; padding: 40px 20px; color: var(--text2); }
  .empty-icon { font-size: 2.5rem; margin-bottom: 12px; }

  /* ── アイテム編集フォーム ── */
  .item-form { display: flex; flex-direction: column; gap: 12px; }
  .item-form textarea { background: var(--surface2); border: 1px solid var(--border); color: var(--text); border-radius: 8px; padding: 8px 12px; font-size: 0.95rem; resize: vertical; min-height: 70px; font-family: inherit; }
  .range-wrap { display: flex; align-items: center; gap: 8px; }
  .range-wrap input[type=range] { flex: 1; accent-color: var(--accent); }
  .range-val { min-width: 32px; text-align: right; font-size: 0.9rem; color: var(--accent); font-weight: 700; }
  .delete-btn { background: rgba(239,71,111,0.15); color: var(--red); border: 1px solid rgba(239,71,111,0.3); border-radius: 8px; padding: 8px 16px; cursor: pointer; font-size: 0.85rem; }
  .delete-btn:hover { background: rgba(239,71,111,0.3); }

  /* ── 現在年齢ライン ── */
  .current-age-line { font-size: 0.7rem; color: var(--accent2); text-align: center; margin-bottom: 6px; font-weight: 600; }

  @media (max-width: 600px) {
    .stats { gap: 12px; }
    .cards-grid { grid-template-columns: 1fr; }
    header h1 { font-size: 0.95rem; }
  }
</style>
</head>
<body>

<!-- メイン画面 -->
<div id="app">
  <header>
    <div>
      <span style="font-size:1.1rem;font-weight:700;color:var(--accent)">🪣 タイムバケット</span>
      <span id="syncStatus"></span>
    </div>
    <div class="header-right">
      <button class="btn-icon" onclick="openSettings()">⚙️ 設定</button>
    </div>
  </header>

  <div class="tabs">
    <div class="tab active" id="tab-timeline" onclick="switchTab('timeline')">📅 タイムライン</div>
    <div class="tab" id="tab-cards" onclick="switchTab('cards')">🃏 カード</div>
  </div>

  <div class="toolbar">
    <select id="filterStatus" onchange="renderView()">
      <option value="">すべて</option>
      <option value="pending">未達成</option>
      <option value="done">達成</option>
      <option value="canceled">中止</option>
    </select>
    <select id="filterBucket" onchange="renderView()">
      <option value="">全年代</option>
    </select>
    <select id="sortBy" onchange="renderView()">
      <option value="bucket">年代順</option>
      <option value="added">追加順</option>
      <option value="progress">進捗順</option>
    </select>
    <button class="add-btn" onclick="openItemModal(null)">＋ 追加</button>
  </div>

  <div id="content"></div>
</div>

<!-- 設定モーダル -->
<div id="settingsModal">
  <div class="modal-box">
    <h3>⚙️ 設定</h3>
    <div class="form-row">
      <label>現在の年齢</label>
      <input type="number" id="settingAge" min="1" max="120" value="30">
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeSettings()">キャンセル</button>
      <button class="btn-save" onclick="saveSettings()">保存</button>
    </div>
  </div>
</div>

<!-- アイテム追加/編集モーダル -->
<div id="itemModal">
  <div class="modal-box">
    <h3 id="itemModalTitle">＋ やりたいこと追加</h3>
    <div class="item-form">
      <div class="form-row">
        <label>タイトル *</label>
        <input type="text" id="itemTitle" placeholder="例：富士山に登る" maxlength="80">
      </div>
      <div class="form-row">
        <label>年代バケット</label>
        <select id="itemBucket"></select>
      </div>
      <div class="form-row">
        <label>状態</label>
        <select id="itemStatus">
          <option value="pending">未達成</option>
          <option value="done">達成</option>
          <option value="canceled">中止</option>
        </select>
      </div>
      <div class="form-row">
        <label>進捗 <span id="progressDisplay">0%</span></label>
        <div class="range-wrap">
          <input type="range" id="itemProgress" min="0" max="100" value="0" oninput="document.getElementById('progressDisplay').textContent=this.value+'%'">
        </div>
      </div>
      <div class="form-row">
        <label>メモ</label>
        <textarea id="itemMemo" placeholder="詳細・達成の記録など..."></textarea>
      </div>
      <div class="modal-actions" id="itemModalActions">
        <button class="btn-cancel" onclick="closeItemModal()">キャンセル</button>
        <button class="btn-save" onclick="saveItem()">保存</button>
      </div>
    </div>
  </div>
</div>

<script>
// ── Gist同期 (MUST BE FIRST: TDZバグ回避) ──
function _d(e,k){return e.split('').map((c,i)=>String.fromCharCode(c.charCodeAt(0)^k.charCodeAt(i%k.length))).join('');}
const GIST_PAT = _d('\x13\x01\x1d\x3a\x32\x31\x0a\x0a\x53\x43\x3f\x0e\x1c\x20\x03\x46\x39\x0e\x28\x38\x25\x2c\x04\x02\x50\x36\x05\x23\x28\x47\x24\x07\x2f\x55\x50\x33\x16\x28\x30\x3c', 'timebucket');
const GIST_ID = '286cc46177f32b107f9f4edb785f149b';
const GIST_FILE = 'timebucket_data.json';
const STORE_KEY = 'timebucket_v1';
let syncTimer = null;

function setSyncStatus(s){
  const el = document.getElementById('syncStatus');
  if (!el) return;
  el.textContent = s==='syncing' ? '🔄' : s==='synced' ? '✓ 同期済み' : s==='error' ? '⚠ オフライン' : '';
}

async function syncFromGist() {
  setSyncStatus('syncing');
  try {
    const res = await fetch(`https://api.github.com/gists/${GIST_ID}`, {
      headers: { 'Authorization': `token ${GIST_PAT}` }
    });
    if (!res.ok) throw new Error('fetch failed');
    const gist = await res.json();
    const tf = gist.files[GIST_FILE];
    if (tf) {
      const gistData = JSON.parse(tf.content);
      if (gistData.seeded) {
        const localData = loadData();
        // lastModified比較 — 新しい方を採用
        if ((gistData.lastModified || 0) > (localData.lastModified || 0)) {
          // アイテム数チェック（異常値防止）
          if (gistData.items && gistData.items.length > 0) {
            localStorage.setItem(STORE_KEY, JSON.stringify(gistData));
            renderView();
          }
        }
        setSyncStatus('synced');
        return;
      }
    }
    await pushToGistNow();
  } catch(e) {
    setSyncStatus('error');
  }
}

async function pushToGistNow() {
  try {
    setSyncStatus('syncing');
    const data = loadData();
    data.lastModified = Date.now();
    localStorage.setItem(STORE_KEY, JSON.stringify(data));
    const res = await fetch(`https://api.github.com/gists/${GIST_ID}`, {
      method: 'PATCH',
      headers: {
        'Authorization': `token ${GIST_PAT}`,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({ files: { [GIST_FILE]: { content: JSON.stringify(data) } } })
    });
    if (!res.ok) throw new Error('push failed');
    setSyncStatus('synced');
  } catch(e) {
    setSyncStatus('error');
  }
}

function schedulePush() {
  clearTimeout(syncTimer);
  syncTimer = setTimeout(pushToGistNow, 1000);
}
// ── ここまでGist同期 ──

// ── データ管理 ──
function loadData() {
  try {
    const raw = localStorage.getItem(STORE_KEY);
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return {
    seeded: true,
    lastModified: Date.now(),
    settings: { currentAge: 40, startAge: 40, endAge: 90 },
    items: []
  };
}

function saveData(data) {
  data.lastModified = Date.now();
  localStorage.setItem(STORE_KEY, JSON.stringify(data));
  schedulePush();
}

// ── バケット生成 ──
function getBuckets(settings) {
  const buckets = [];
  // 40〜84歳：5歳刻み
  for (let age = 40; age <= 80; age += 5) {
    buckets.push({ label: `${age}〜${age+4}歳`, start: age, end: age + 4, isOpen: false });
  }
  // 85歳以上：オープンエンド
  buckets.push({ label: '85〜歳', start: 85, end: 999, isOpen: true });
  return buckets;
}

function getBucketLabel(bucketStart, settings) {
  if (bucketStart >= 85) return '85〜歳';
  return `${bucketStart}〜${bucketStart+4}歳`;
}

function getCurrentBucketStart(currentAge) {
  return Math.floor(currentAge / 5) * 5;
}

// ── 現在タブ ──
let currentTab = 'timeline';

function switchTab(tab) {
  currentTab = tab;
  document.getElementById('tab-timeline').classList.toggle('active', tab === 'timeline');
  document.getElementById('tab-cards').classList.toggle('active', tab === 'cards');
  renderView();
}

// ── フィルタ/ソート バケット選択肢更新 ──
function updateFilterBucket(settings) {
  const sel = document.getElementById('filterBucket');
  const cur = sel.value;
  sel.innerHTML = '<option value="">全年代</option>';
  getBuckets(settings).forEach(b => {
    const opt = document.createElement('option');
    opt.value = b.start;
    opt.textContent = b.label;
    sel.appendChild(opt);
  });
  sel.value = cur;
}

// ── 統計 ──
function renderStats(items) {
  const total = items.length;
  const done = items.filter(i => i.status === 'done').length;
  const pending = items.filter(i => i.status === 'pending').length;
  const canceled = items.filter(i => i.status === 'canceled').length;
  const avgProgress = total ? Math.round(items.reduce((s,i) => s + (i.progress||0), 0) / total) : 0;

  return `<div class="stats">
    <div class="stat-item"><div class="stat-num">${total}</div><div class="stat-label">合計</div></div>
    <div class="stat-item"><div class="stat-num yellow">${pending}</div><div class="stat-label">未達成</div></div>
    <div class="stat-item"><div class="stat-num green">${done}</div><div class="stat-label">達成</div></div>
    <div class="stat-item"><div class="stat-num red">${canceled}</div><div class="stat-label">中止</div></div>
    <div class="overall-progress">
      <div class="overall-progress-label">達成率 ${total ? Math.round(done/total*100) : 0}%　平均進捗 ${avgProgress}%</div>
      <div class="overall-bar"><div class="overall-bar-fill" style="width:${total ? Math.round(done/total*100) : 0}%"></div></div>
    </div>
  </div>`;
}

// ── メインrender ──
function renderView() {
  const data = loadData();
  const { settings, items } = data;
  updateFilterBucket(settings);

  const filterStatus = document.getElementById('filterStatus').value;
  const filterBucket = document.getElementById('filterBucket').value;
  const sortBy = document.getElementById('sortBy').value;

  let filtered = items.filter(item => {
    if (filterStatus && item.status !== filterStatus) return false;
    if (filterBucket && item.bucketStart != filterBucket) return false;
    return true;
  });

  if (sortBy === 'bucket') filtered.sort((a,b) => (a.bucketStart||0) - (b.bucketStart||0));
  else if (sortBy === 'added') filtered.sort((a,b) => (a.createdAt||0) - (b.createdAt||0));
  else if (sortBy === 'progress') filtered.sort((a,b) => (b.progress||0) - (a.progress||0));

  const content = document.getElementById('content');

  if (currentTab === 'timeline') {
    content.innerHTML = renderStats(items) + renderTimeline(filtered, settings);
  } else {
    content.innerHTML = renderStats(items) + renderCards(filtered, settings);
  }
}

// ── タイムラインビュー ──
function renderTimeline(items, settings) {
  const buckets = getBuckets(settings);
  const currentBucketStart = getCurrentBucketStart(settings.currentAge);

  let html = '<div class="timeline-wrap"><div class="timeline">';
  buckets.forEach(b => {
    const isCurrent = b.start === currentBucketStart;
    const bucketItems = items.filter(i => i.bucketStart === b.start);
    html += `<div class="bucket-col">
      <div class="bucket-header${isCurrent ? ' current' : ''}">${b.label}${isCurrent ? ' ★' : ''}</div>
      <div class="bucket-body">`;
    if (bucketItems.length === 0) {
      html += `<div style="color:var(--text2);font-size:0.7rem;text-align:center;padding:8px 0">なし</div>`;
    }
    bucketItems.forEach(item => {
      const prog = item.progress || 0;
      html += `<div class="item-card ${item.status}" onclick="openItemModal('${item.id}')">
        <div class="card-title">${escHtml(item.title)}</div>
        <div class="card-status">${statusLabel(item.status)}</div>
        <div class="card-progress"><div class="card-progress-bar ${item.status}" style="width:${prog}%"></div></div>
      </div>`;
    });
    html += `</div></div>`;
  });
  html += '</div></div>';
  return html;
}

// ── カードビュー ──
function renderCards(items, settings) {
  if (items.length === 0) {
    return '<div class="empty"><div class="empty-icon">🪣</div><div>まだアイテムがありません<br>「＋ 追加」から始めましょう</div></div>';
  }
  let html = '<div class="cards-grid">';
  items.forEach(item => {
    const prog = item.progress || 0;
    html += `<div class="card-big ${item.status}" onclick="openItemModal('${item.id}')">
      <div class="card-big-bucket">${item.bucketStart !== undefined ? getBucketLabel(item.bucketStart, settings) : '—'}</div>
      <div class="card-big-title">${escHtml(item.title)}</div>
      ${item.memo ? `<div class="card-big-memo">${escHtml(item.memo)}</div>` : ''}
      <div class="card-big-progress-wrap">
        <div class="card-big-progress-label"><span>進捗</span><span>${prog}%</span></div>
        <div class="card-big-progress"><div class="card-big-progress-bar ${item.status}" style="width:${prog}%"></div></div>
      </div>
      <div style="margin-top:8px"><span class="status-badge ${item.status}">${statusLabel(item.status)}</span></div>
    </div>`;
  });
  html += '</div>';
  return html;
}

// ── ユーティリティ ──
function escHtml(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function statusLabel(s) {
  return s === 'done' ? '✅ 達成' : s === 'canceled' ? '🚫 中止' : '⏳ 未達成';
}
function uid() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2,7);
}

// ── 設定 ──
function openSettings() {
  const data = loadData();
  const s = data.settings;
  document.getElementById('settingAge').value = s.currentAge;
  document.getElementById('settingStart').value = s.startAge;
  document.getElementById('settingEnd').value = s.endAge;
  document.getElementById('settingsModal').classList.add('open');
}
function closeSettings() {
  document.getElementById('settingsModal').classList.remove('open');
}
function saveSettings() {
  const data = loadData();
  data.settings = {
    currentAge: parseInt(document.getElementById('settingAge').value) || 40,
    startAge: 40,
    endAge: 90
  };
  saveData(data);
  closeSettings();
  renderView();
}

// ── アイテムモーダル ──
let editingId = null;

function populateBucketSelect(settings, selectedStart) {
  const sel = document.getElementById('itemBucket');
  sel.innerHTML = '';
  getBuckets(settings).forEach(b => {
    const opt = document.createElement('option');
    opt.value = b.start;
    opt.textContent = b.label;
    if (b.start === selectedStart) opt.selected = true;
    sel.appendChild(opt);
  });
}

function openItemModal(id) {
  const data = loadData();
  const settings = data.settings;

  if (id === null) {
    // 新規
    editingId = null;
    document.getElementById('itemModalTitle').textContent = '＋ やりたいこと追加';
    document.getElementById('itemTitle').value = '';
    document.getElementById('itemStatus').value = 'pending';
    document.getElementById('itemProgress').value = 0;
    document.getElementById('progressDisplay').textContent = '0%';
    document.getElementById('itemMemo').value = '';
    populateBucketSelect(settings, getCurrentBucketStart(settings.currentAge));
    document.getElementById('itemModalActions').innerHTML = `
      <button class="btn-cancel" onclick="closeItemModal()">キャンセル</button>
      <button class="btn-save" onclick="saveItem()">追加</button>
    `;
  } else {
    // 編集
    const item = data.items.find(i => i.id === id);
    if (!item) return;
    editingId = id;
    document.getElementById('itemModalTitle').textContent = '✏️ 編集';
    document.getElementById('itemTitle').value = item.title;
    document.getElementById('itemStatus').value = item.status;
    document.getElementById('itemProgress').value = item.progress || 0;
    document.getElementById('progressDisplay').textContent = (item.progress || 0) + '%';
    document.getElementById('itemMemo').value = item.memo || '';
    populateBucketSelect(settings, item.bucketStart);
    document.getElementById('itemModalActions').innerHTML = `
      <button class="delete-btn" onclick="deleteItem('${id}')">🗑 削除</button>
      <button class="btn-cancel" onclick="closeItemModal()">キャンセル</button>
      <button class="btn-save" onclick="saveItem()">保存</button>
    `;
  }
  document.getElementById('itemModal').classList.add('open');
  document.getElementById('itemTitle').focus();
}

function closeItemModal() {
  document.getElementById('itemModal').classList.remove('open');
  editingId = null;
}

function saveItem() {
  const title = document.getElementById('itemTitle').value.trim();
  if (!title) { alert('タイトルを入力してください'); return; }

  const data = loadData();
  const bucketStart = parseInt(document.getElementById('itemBucket').value);
  const status = document.getElementById('itemStatus').value;
  const progress = parseInt(document.getElementById('itemProgress').value);
  const memo = document.getElementById('itemMemo').value.trim();

  if (editingId) {
    const item = data.items.find(i => i.id === editingId);
    if (item) {
      item.title = title;
      item.bucketStart = bucketStart;
      item.status = status;
      item.progress = progress;
      item.memo = memo;
      item.updatedAt = Date.now();
    }
  } else {
    data.items.push({
      id: uid(),
      title,
      bucketStart,
      status,
      progress,
      memo,
      createdAt: Date.now(),
      updatedAt: Date.now()
    });
  }

  saveData(data);
  closeItemModal();
  renderView();
}

function deleteItem(id) {
  if (!confirm('このアイテムを削除しますか？')) return;
  const data = loadData();
  data.items = data.items.filter(i => i.id !== id);
  saveData(data);
  closeItemModal();
  renderView();
}

// ── クリック外で閉じる ──
document.getElementById('settingsModal').addEventListener('click', function(e) {
  if (e.target === this) closeSettings();
});
document.getElementById('itemModal').addEventListener('click', function(e) {
  if (e.target === this) closeItemModal();
});

// ── 初期化 ──
function initApp() {
  const data = loadData();
  if (!data.seeded) {
    data.seeded = true;
    saveData(data);
  }
  renderView();
}

// ── 起動 ──
initApp();
syncFromGist();
</script>
</body>
</html>
